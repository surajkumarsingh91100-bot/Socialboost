<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Social Boost Pro</title>

<style>
body {
  margin:0;
  font-family:sans-serif;
  background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color:white;
  text-align:center;
}

.nav {
  padding:15px;
  font-size:20px;
  font-weight:bold;
  background:#00000040;
  backdrop-filter:blur(10px);
}

.card {
  margin:20px;
  padding:20px;
  border-radius:15px;
  background:#ffffff10;
  backdrop-filter: blur(10px);
}

input {
  padding:10px;
  margin:5px;
  border:none;
  border-radius:8px;
  width:80%;
}

button {
  padding:12px 20px;
  margin:10px;
  border:none;
  border-radius:10px;
  background:#00ffcc;
  font-weight:bold;
}

button:hover {
  background:#00ccaa;
}
</style>
</head>

<body>

<div class="nav">🚀 Social Boost Pro</div>

<div class="card">
<h3>Signup / Login</h3>
<input id="email" placeholder="Email"><br>
<input id="pass" type="password" placeholder="Password"><br>

<button onclick="signup()">Signup</button>
<button onclick="login()">Login</button>
</div>

<div class="card">
<h3 id="welcome">Not logged in</h3>
<p>Coins: <span id="coins">0</span></p>

<button onclick="earn()">Earn Coins</button>
<button onclick="spend()">Spend Coins</button>
</div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import { getFirestore, doc, setDoc, getDoc, updateDoc } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* 🔥 YOUR FIREBASE CONFIG */
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_AUTH_DOMAIN",
  projectId: "YOUR_PROJECT_ID"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth();
const db = getFirestore();

let currentUser = null;

/* SIGNUP */
window.signup = async function () {
  let email = document.getElementById("email").value;
  let pass = document.getElementById("pass").value;

  let userCred = await createUserWithEmailAndPassword(auth, email, pass);

  await setDoc(doc(db, "users", userCred.user.uid), {
    email: email,
    coins: 0
  });

  alert("Signup successful");
}

/* LOGIN */
window.login = async function () {
  let email = document.getElementById("email").value;
  let pass = document.getElementById("pass").value;

  let userCred = await signInWithEmailAndPassword(auth, email, pass);
  currentUser = userCred.user;

  loadData();
}

/* LOAD DATA */
async function loadData() {
  let ref = doc(db, "users", currentUser.uid);
  let snap = await getDoc(ref);

  document.getElementById("welcome").innerText =
    "Welcome " + currentUser.email;

  document.getElementById("coins").innerText =
    snap.data().coins;
}

/* EARN */
window.earn = async function () {
  if (!currentUser) return alert("Login first");

  let ref = doc(db, "users", currentUser.uid);
  let snap = await getDoc(ref);

  let newCoins = snap.data().coins + 10;

  await updateDoc(ref, { coins: newCoins });
  document.getElementById("coins").innerText = newCoins;
}

/* SPEND */
window.spend = async function () {
  if (!currentUser) return alert("Login first");

  let ref = doc(db, "users", currentUser.uid);
  let snap = await getDoc(ref);

  if (snap.data().coins >= 20) {
    let newCoins = snap.data().coins - 20;
    await updateDoc(ref, { coins: newCoins });
    document.getElementById("coins").innerText = newCoins;
    alert("Profile Promoted 🚀");
  } else {
    alert("Not enough coins");
  }
}
</script>

</body>
</html>
